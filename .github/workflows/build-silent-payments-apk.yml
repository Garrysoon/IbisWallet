name: Build Silent Payments APK

on:
  push:
    branches: [ feature/silent-payments ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        clean: true
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Clean and build Silent Payments (Optimized)
      run: |
        rm -rf app/build
        rm -rf ~/.gradle
        ./gradlew --no-daemon --no-build-cache :app:assembleDebug --stacktrace
      
    - name: Upload Split APKs (arm64-v8a optimized)
      uses: actions/upload-artifact@v4
      with:
        name: ibis-wallet-silent-payments-arm64
        # With split APKs, the path includes ABI in filename
        path: |
          app/build/outputs/apk/debug/*-arm64-v8a-*.apk
          app/build/outputs/apk/debug/app-arm64-v8a-debug.apk
        retention-days: 14
        if-no-files-found: warn
        
    - name: Upload Universal APK (fallback)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: ibis-wallet-silent-payments-universal
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14
        if-no-files-found: ignore
        
    - name: List APK outputs
      run: |
        echo "=== APK Output Files ==="
        ls -lah app/build/outputs/apk/debug/ || echo "No debug APKs found"
        echo ""
        echo "=== APK Sizes ==="
        du -h app/build/outputs/apk/debug/*.apk 2>/dev/null || echo "No APKs to measure"
        
    - name: Upload build reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports-silent-payments
        path: app/build/reports/
        retention-days: 7
