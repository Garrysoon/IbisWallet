name: Build Release APK

on:
  workflow_dispatch:  # Manual trigger only - requires signing key
    inputs:
      version_name:
        description: 'Version name (e.g., 3.1.3)'
        required: true
        default: '3.1.3-beta'
      version_code:
        description: 'Version code (integer)'
        required: true
        default: '10'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          ~/.android/build-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    # NOTE: For signed release, you need to add signing keys as GitHub Secrets
    # See: https://developer.android.com/studio/publish/app-signing#generate-key
    
    - name: Build Release APK (unsigned)
      run: ./gradlew :app:assembleRelease --stacktrace
      env:
        VERSION_NAME: ${{ github.event.inputs.version_name }}
        VERSION_CODE: ${{ github.event.inputs.version_code }}
      
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        
    - name: Create Release Notes
      run: |
        echo "## Ibis Wallet ${{ github.event.inputs.version_name }}" > release-notes.md
        echo "" >> release-notes.md
        echo "### ⚠️ IMPORTANT: This is an UNSIGNED release APK" >> release-notes.md
        echo "" >> release-notes.md
        echo "Before installing on your device, you need to either:" >> release-notes.md
        echo "1. Sign it with your own keystore (for personal use)" >> release-notes.md
        echo "2. Install debug version instead (for testing)" >> release-notes.md
        echo "" >> release-notes.md
        echo "### Security Improvements in this Build:" >> release-notes.md
        echo "- ✅ Network cleartext traffic disabled (except Tor .onion)" >> release-notes.md
        echo "- ✅ Certificate pinning infrastructure added" >> release-notes.md
        echo "- ✅ SQLCipher encrypted database for cache" >> release-notes.md
        echo "- ✅ SecureRandom for UI operations" >> release-notes.md
        echo "- ✅ BBQr support for PSBT (reduced 3000+ frames to ~20-30)" >> release-notes.md
        echo "" >> release-notes.md
        echo "### QR Optimization:" >> release-notes.md
        echo "- ✅ BBQr encoding for PSBT (3-4x better density than BC-UR)" >> release-notes.md
        echo "- ✅ Reduced BC-UR fountain redundancy 10x → 3x" >> release-notes.md
        echo "- ✅ Increased fragment sizes for large PSBTs" >> release-notes.md
        echo "" >> release-notes.md
        echo "Built: $(date -u '+%Y-%m-%d %H:%M UTC')" >> release-notes.md
        
    - name: Upload Release Notes
      uses: actions/upload-artifact@v4
      with:
        name: release-notes
        path: release-notes.md
        retention-days: 30
